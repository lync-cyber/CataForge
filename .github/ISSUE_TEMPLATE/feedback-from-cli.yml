name: Feedback (from `cataforge feedback`)
description: Pre-filled report generated by `cataforge feedback bug|suggest|correction-export`
title: "feedback: <short description>"
labels: ["feedback", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Generated by `cataforge feedback`. The CLI already aggregated your
        environment + doctor + upstream-gap corrections into the body —
        you should only need to paste it below and answer the two short
        questions at the top.

        Don't have the CLI installed? Use the regular `Bug report` template
        instead.

  - type: dropdown
    id: kind
    attributes:
      label: Bundle kind
      description: Which `cataforge feedback` subcommand produced this body?
      options:
        - bug
        - suggest
        - correction-export
    validations:
      required: true

  - type: input
    id: cataforge-version
    attributes:
      label: CataForge version
      description: From the `## Environment` block of the pasted body
      placeholder: "0.2.1"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Generated body
      description: |
        Paste the output of one of:

        ```bash
        cataforge feedback bug --print
        cataforge feedback suggest --print
        cataforge feedback correction-export --print
        ```

        (Or pipe into your clipboard with `--clip` and paste here.)
        Path redaction is on by default — review before submitting if you
        passed `--include-paths`.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything the bundle missed?
      description: Steps to reproduce, screenshots, or expected vs actual behavior.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reviewed the pasted body for sensitive paths / secrets.
          required: true
