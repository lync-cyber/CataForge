name: Bug report
description: Report a reproducible bug in CataForge
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so maintainers can reproduce the issue quickly.

        **Tip:** if you are running CataForge ≥ 0.3.0, prefer
        `cataforge feedback bug --gh` (or `--clip`) — it pre-fills
        version / doctor / EVENT-LOG / `upstream-gap` corrections and
        opens an issue using the dedicated `feedback-from-cli`
        template. Saves manual copy-pasting and avoids stale doctor output.

  - type: input
    id: version
    attributes:
      label: CataForge version
      description: Output of `cataforge --version`
      placeholder: "0.1.8"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Target IDE platform
      options:
        - claude-code
        - cursor
        - codex
        - opencode
        - N/A (CLI only)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14.3 / Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal command sequence that triggers the bug
      placeholder: |
        1. `cataforge setup --platform cursor`
        2. `cataforge deploy`
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stack traces and stderr output verbatim. Wrap in triple backticks.
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`cataforge doctor` output"
      description: Paste the full output (redact any secrets).
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest release (or pinned a specific tag above).
          required: true
