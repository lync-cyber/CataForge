name: Scaffold sync

# The packaged scaffold at ``src/cataforge/_assets/cataforge_scaffold/`` is a
# generated mirror of the canonical ``.cataforge/`` source tree.  Editing the
# mirror directly is forbidden — contributors must change ``.cataforge/`` and
# let ``scripts/sync_scaffold.py`` (also wired into the hatch build hook)
# regenerate the mirror.  This job enforces that rule on every PR & push.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  check:
    name: Reject scaffold drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify scaffold mirror is in sync with .cataforge/
        run: |
          set -euo pipefail
          python scripts/sync_scaffold.py --check

      - name: Double-check via sync + git diff
        # Belt-and-braces: even if --check has a blind spot, running the sync
        # and diffing guarantees no drift slips through.
        run: |
          set -euo pipefail
          python scripts/sync_scaffold.py
          if ! git diff --exit-code -- src/cataforge/_assets/cataforge_scaffold; then
              echo ""
              echo "ERROR: src/cataforge/_assets/cataforge_scaffold/ drifted from .cataforge/"
              echo ""
              echo "This directory is a generated mirror. Do not edit it directly."
              echo "Edit .cataforge/ and run:"
              echo "  python scripts/sync_scaffold.py"
              echo "then commit the refreshed mirror."
              exit 1
          fi
