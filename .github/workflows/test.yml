name: Tests

# Runs pytest on every PR and push to main.  Split into two jobs:
#
#   - `unit`  fast, cross-platform, cross-Python matrix (no slow marker).
#             Any regression here should block the PR.
#   - `e2e`   single ubuntu + py3.12 job that actually builds a wheel,
#             spawns venvs and exercises `cataforge setup` / `upgrade`
#             via subprocess. Runs only on Linux because venv creation
#             plus subprocess encoding on Windows add flakiness without
#             testing anything the unit suite doesn't already cover.
#
# Historical context: until this workflow landed, the 298-test suite only
# ran on contributors' laptops — CI had scaffold-sync, pr-title lint, and
# PyPI publish, but no gate for broken tests on merge. See review PR #57.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    name: Unit (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so check_changelog_fragments.py can diff
          # HEAD against origin/main — the default shallow clone hides
          # HEAD's parent so `git diff origin/main...HEAD` cannot find a
          # merge base.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src tests scripts

      - name: "pre-commit parity (catches local hooks ↔ CI drift)"
        # Runs the full .pre-commit-config.yaml hook set so a contributor
        # without `pre-commit install` can't ship a change that local
        # hooks would have caught. Linux-only — the hooks read repo
        # files only, OS-specific runs add no coverage. If this step
        # red-lights but the dedicated check above is green, somebody
        # has changed .pre-commit-config.yaml in a way CI doesn't yet
        # mirror — fix the divergence rather than relaxing the hook.
        if: runner.os == 'Linux'
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

      - name: Pytest (fast — exclude slow marker)
        run: python -m pytest tests/ -q -m "not slow"

      - name: "Anti-rot guards (10: skill count, dev branch, changelog links, changelog fragments, doc versions, profile schema, hooks schema, schema-Python parity, marketing words, design residue)"
        # Run on Linux only — these scripts read the same files everywhere
        # and the matrix duplication adds noise without coverage.
        if: runner.os == 'Linux'
        env:
          # check_changelog_fragments.py diffs HEAD against this base.
          # PR runs use the actual base branch; push-to-main runs default
          # to origin/main (script no-ops when no files differ).
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          python scripts/checks/check_skill_count.py
          python scripts/checks/check_no_dev_branch_refs.py
          python scripts/checks/check_changelog_link_table.py
          python scripts/checks/check_changelog_fragments.py
          python scripts/checks/check_doc_versions.py
          python scripts/checks/check_profile_yaml_keys.py
          python scripts/checks/check_hooks_yaml_schema.py
          python scripts/checks/check_schema_python_parity.py
          python scripts/checks/check_no_marketing_words.py
          python scripts/checks/check_no_design_residue.py

      - name: "uv lockfile freshness (uv.lock ↔ pyproject.toml in sync)"
        # Verifies uv.lock matches the resolved deps from pyproject.toml.
        # Catches "edited deps but forgot to refresh uv.lock" before it
        # silently rots downstream uv-based installs. Linux-only because
        # the lockfile is platform-independent.
        if: runner.os == 'Linux'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv lock --check

      - name: "cataforge doctor (gates _DEPRECATED_REFS, runtime_api_version, orphan docs, …)"
        # Promote `cataforge doctor` from a manually-invoked diagnostic to a
        # required CI gate. Until this step landed every doctor check
        # (deprecated-protocol-script-references, runtime_api_version drift,
        # protocol-script orphans, EVENT-LOG schema, and the new docs-index
        # orphan check from PR #73) only fired when a contributor remembered
        # to run it locally. Linux-only — same rationale as the anti-rot
        # block above; doctor reads the repo, not OS-specific state.
        if: runner.os == 'Linux'
        run: cataforge doctor

      - name: "framework-review (B1/B2/B3/B4/B5 meta-asset audit)"
        # Promote framework-review from a manually-invoked audit to a
        # required CI gate. Catches the rot classes that doctor can't see:
        # AGENT.md / SKILL.md missing required sections, broken cross-refs
        # in skills:/depends:, SKILL.md ↔ CHECKS_MANIFEST drift, hard-coded
        # constant literals, and phase × agent × skill coverage gaps.
        # Linux-only — same rationale as doctor.
        if: runner.os == 'Linux'
        run: cataforge skill run framework-review -- all

  e2e:
    name: E2E install + upgrade (ubuntu, py3.12)
    runs-on: ubuntu-latest
    # Don't block the PR on network flakiness from the cross-version test —
    # the install-and-upgrade test (which uses only the locally-built wheel)
    # is the real regression gate. Mark this job continue-on-error so the
    # required-check is the `unit` matrix above.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build + dev deps
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Pytest (e2e — slow marker only, network gated)
        env:
          # Enable the PyPI-fetching cross-version test. If PyPI is
          # transiently unavailable the job red-lights — acceptable
          # because a release-chain problem *should* surface loudly.
          CATAFORGE_E2E_NETWORK: "1"
        run: python -m pytest tests/e2e/ -q -m slow
