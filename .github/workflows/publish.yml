name: Publish to PyPI

# Trusted publishing via OIDC — no API token required.
# Prerequisite: on PyPI, add this repo as a Trusted Publisher for the
# `cataforge` project (Owner: lync-cyber, Repo: CataForge,
# Workflow: publish.yml, Environment: pypi).
#
# Usage: push a `v*` tag (e.g. `v0.1.0`) — make sure the tag matches
# `__version__` in src/cataforge/__init__.py.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Guardrail: tag-triggered runs must have `__version__` and a
      # matching `## [x.y.z]` section in CHANGELOG.md. Otherwise we'd
      # happily publish a wheel whose version number is detached from
      # the repo's released history — exactly the failure mode that
      # landed v0.1.3-v0.1.5 without tags and v0.1.4 without a section.
      - name: Verify tag matches __version__ and CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import re,pathlib; t=pathlib.Path('src/cataforge/__init__.py').read_text(); print(re.search(r'__version__\s*=\s*[\"\\'](.+?)[\"\\']', t).group(1))")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match __version__ $PKG_VERSION in src/cataforge/__init__.py"
            exit 1
          fi
          if ! grep -qE "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' section for this release"
            exit 1
          fi
          DUPES=$(grep -cE "^## \[$TAG\]" CHANGELOG.md)
          if [ "$DUPES" -gt 1 ]; then
            echo "::error::CHANGELOG.md has $DUPES '## [$TAG]' sections (must be exactly 1)"
            exit 1
          fi
          echo "tag / __version__ / CHANGELOG all agree on $TAG"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cataforge
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
