name: Publish to PyPI

# Trusted publishing via OIDC — no API token required.
# Prerequisite: on PyPI, add this repo as a Trusted Publisher for the
# `cataforge` project (Owner: lync-cyber, Repo: CataForge,
# Workflow: publish.yml, Environment: pypi).
#
# Usage: push a `v*` tag (e.g. `v0.1.0`) — make sure the tag matches
# `__version__` in src/cataforge/__init__.py.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cataforge
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
