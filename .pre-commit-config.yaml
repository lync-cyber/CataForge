## CataForge pre-commit hooks
##
## Install once per clone:    pip install pre-commit && pre-commit install
## Run on demand:              pre-commit run --all-files
##
## Local-only (no network on commit). The same checks run in CI as a
## belt-and-braces guard — these hooks just shorten the feedback loop.

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: python -m ruff check src tests scripts
        language: system
        pass_filenames: false
        types_or: [python]
      - id: stdio-utf8-guard
        name: scripts/*.py call ensure_utf8_stdio() (Windows cp1252 guard)
        description: |
          Mirrors tests/test_scripts_stdio_guard.py at commit time. Any
          new script that prints non-ASCII (→/中文/emoji) to stdout will
          crash on Windows cp1252 unless it reconfigures stdio to UTF-8;
          catch the omission locally instead of waiting for CI.
        entry: python -m pytest tests/test_scripts_stdio_guard.py -q
        language: system
        pass_filenames: false
        files: ^scripts/.*\.py$
      - id: schema-python-parity
        name: schemas/*.schema.json vs Python mirror parity
        description: |
          The two formal JSON Schema files have hand-rolled Python mirrors
          (cataforge.core.event_log + validate_agent_result hook). When one
          edge of the pair drifts, validation diverges silently. This check
          locks them.
        entry: python scripts/checks/check_schema_python_parity.py
        language: system
        pass_filenames: false
        files: ^(\.cataforge/schemas/.*\.schema\.json|src/cataforge/core/event_log\.py|src/cataforge/hook/scripts/validate_agent_result\.py)$
      - id: workflow-yaml-parse
        name: github workflows parse cleanly
        description: |
          Catches step-name colons / indentation issues that make GitHub
          Actions reject the workflow file (manifests as "This run likely
          failed because of a workflow file issue" with no logs). Was a
          silent CI red streak on main; see PR #75.
        entry: python -c "import sys, yaml; [yaml.safe_load(open(f, encoding='utf-8').read()) for f in sys.argv[1:]]"
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
