platform_id: opencode
display_name: OpenCode
version_tested: "1.3"

tool_map:
  file_read: read
  file_write: write
  file_edit: edit
  file_glob: glob
  file_grep: grep
  shell_exec: bash
  web_search: websearch
  web_fetch: webfetch
  user_question: question
  agent_dispatch: task

extended_capabilities:
  notebook_edit: null
  browser_preview: null
  image_input: image             # drag-and-drop image analysis
  code_review: null

agent_definition:
  format: yaml-frontmatter
  scan_dirs:
    - .opencode/agents
    - .claude/agents
  needs_deploy: true

agent_config:
  supported_fields:
    - name
    - description
    - tools
    - model
  memory_scopes: []
  isolation_modes: []

instruction_file:
  reads_claude_md: false
  targets:
    - type: project_state_copy
      path: AGENTS.md
  additional_outputs: []

dispatch:
  tool_name: task
  is_async: false
  params: [subagent_type, description, prompt]

hooks:
  # OpenCode uses a JS/TS plugin system for hooks, not JSON config files.
  # Hook scripts must be wrapped as OpenCode plugins in .opencode/plugins/.
  # Events: tool.execute.before/after, session.created, session.idle, etc.
  config_format: plugin
  config_path: .opencode/plugins/
  event_map:
    PreToolUse: tool.execute.before
    PostToolUse: tool.execute.after
    Stop: session.idle
    SessionStart: session.created
    Notification: null
  tool_overrides: {}
  matcher_map: {}
  degradation:
    guard_dangerous: degraded      # Needs JS/TS plugin adapter wrapper
    log_agent_dispatch: degraded
    validate_agent_result: degraded
    lint_format: degraded
    detect_correction: degraded
    notify_done: degraded
    notify_permission: degraded
    session_context: degraded

features:
  cloud_agents: false
  agent_teams: false
  parallel_agents: false
  scheduled_tasks: false
  background_agents: false
  plan_mode: true                # Plan mode (suggest without changes)
  computer_use: false
  realtime_voice: false
  multi_model: true              # 75+ providers via Models.dev
  session_resume: true           # Git-backed session review
  worktree_isolation: false
  autonomy_slider: false
  ci_cd_integration: true        # opencode github install/run
  multi_root: false
  agent_memory: false
  plugin_marketplace: true       # npm + local plugins
  context_management: false

permissions:
  modes: [default]

model_routing:
  available_models: []           # provider-agnostic — 75+ models via Models.dev
  per_agent_model: true
