platform_id: codex
display_name: Codex CLI
version_tested: "0.1"

tool_map:
  file_read: shell
  file_write: apply_patch
  file_edit: apply_patch
  file_glob: shell
  file_grep: shell
  shell_exec: shell
  web_search: web_search
  web_fetch: shell
  user_question: null
  agent_dispatch: spawn_agent

agent_definition:
  format: toml
  scan_dirs:
    - .codex/agents
  needs_deploy: true

instruction_file:
  reads_claude_md: true
  additional_outputs: []

dispatch:
  tool_name: spawn_agent
  is_async: true
  params: [agent, fork_context, prompt]

hooks:
  config_format: json
  config_path: .codex/hooks.json
  event_map:
    PreToolUse: PreToolUse
    PostToolUse: PostToolUse
    Stop: Stop
    SessionStart: SessionStart
    Notification: null
  matcher_map:
    Bash: shell
    Agent: null
    "Edit|Write": null
    AskUserQuestion: null
  degradation:
    guard_dangerous: native
    log_agent_dispatch: degraded
    validate_agent_result: degraded
    lint_format: degraded
    detect_correction: degraded
    notify_done: native
    notify_permission: degraded
    session_context: native
