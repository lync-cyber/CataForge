[project]
name = "cataforge"
version = "0.4.1"
description = "AI 驱动的全生命周期软件开发工作流框架"
license = {text = "MIT"}
requires-python = ">=3.8"
readme = "README.md"

[project.urls]
Homepage = "https://github.com/lync-cyber/CataForge"
Repository = "https://github.com/lync-cyber/CataForge"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = [
    # pytest-asyncio 0.23.x 在 Python 3.14+ 使用了已废弃的 asyncio API，
    # 待升级到 >=1.0 后可移除此过滤
    "ignore:'asyncio.iscoroutinefunction':DeprecationWarning:pytest_asyncio",
    "ignore:'asyncio.get_event_loop_policy':DeprecationWarning:pytest_asyncio",
    # pydantic v1 兼容层在 Python 3.14+ 触发警告（langsmith 依赖）
    "ignore:Core Pydantic V1 functionality:UserWarning:langsmith",
]
