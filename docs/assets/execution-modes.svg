<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-label="CataForge 三种执行模式对比">
  <title>CataForge 三种执行模式对比</title>
  <desc>standard 7 阶段 / agile-lite 5 阶段 / agile-prototype 2 阶段，同一 pill 宽度便于目测。</desc>
  <!--
    prompt-version: 1.0
    last-regenerated: 2026-04-27
    prompt: |
      生成 CataForge "三种执行模式对比" 示意图，遵循 docs/assets/design-tokens.md。
      尺寸：viewBox 980×360。
      内容：三条横向流水线（pill 颗粒等宽便于横向比较）
        - standard：Requirements → Architecture → Design → Planning → Development → Testing → Deployment
        - agile-lite：合并 lite-doc → planning → Development(TDD) → Testing → Deployment
        - agile-prototype：brief → Development
      左侧标模式名 + 阶段数字；右侧标"适用场景"短语（正式项目 / 小团队迭代 / 快速原型）。
      禁止：渐变、阴影、emoji。
  -->


  <defs>
