  <!-- Footer hint -->
  <text class="hint" x="20"  y="360">One spec · four native shapes. Hook matcher / MCP key naming / instruction path all diverge per platform —</text>
  <text class="hint" x="20"  y="376">the adapter hides that divergence behind a single profile.yaml per platform.</text>

  <!-- Footer ruler -->
  <line class="rule" x1="20" y1="400" x2="940" y2="400"/>
  <text class="cap"  x="20"  y="412">ADAPTER TRANSLATION</text>
  <text class="cap"  x="870" y="412">FIG. 07</text>
