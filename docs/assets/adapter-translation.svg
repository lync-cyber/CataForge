  <path class="rule" d="M560,170 L580,170" marker-end="url(#arrow5)"/>
  <path class="rule" d="M560,230 L580,230" marker-end="url(#arrow5)"/>
  <path class="rule" d="M560,290 L580,290" marker-end="url(#arrow5)"/>

  <!-- ============ Right: 4 platform output clusters ============ -->
  <g transform="translate(580,66)">
    <!-- Claude Code -->
    <g transform="translate(0,0)">
      <rect class="card" width="360" height="80" rx="2"/>
      <text class="tag"  x="12" y="18">CLAUDE-CODE</text>
      <text class="path" x="12" y="38">CLAUDE.md · .claude/agents/*.md</text>
