      <text class="tag"  x="12" y="18">CURSOR</text>
      <text class="path" x="12" y="38">AGENTS.md · .cursor/rules/*.mdc</text>
      <text class="path" x="12" y="54">.cursor/hooks.json · .cursor/mcp.json</text>
